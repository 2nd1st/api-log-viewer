name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Opt every JS-based action into Node 24 ahead of GitHub's 2026-09-16
# Node 20 EOL. checkout@v4, setup-node@v4, pnpm/action-setup@v4 still
# ship as Node 20 bundles; this flag keeps them on a supported runtime
# without forcing major-version churn through each action. Remove
# once Node 24 becomes the runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package dist.zip
        run: |
          cd dist
          zip -r ../dist.zip .
          cd ..
          sha256sum dist.zip | awk '{print $1}' > dist.zip.sha256
          echo "dist.zip sha256: $(cat dist.zip.sha256)"
      # Build the release body from CHANGELOG.md so the GitHub release page
      # carries the same content as the file readers/CI have always read.
      # Falls back to the tag annotation when no matching section exists so
      # the release body is never empty (was the v0.1.1/v0.1.2 retro-fix
      # trigger across both repos).
      - name: Build release notes from CHANGELOG
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            BEGIN { hit = 0 }
            /^## \[/ {
              if (hit) { exit }
              if ($0 ~ "^## \\[" v "\\]") { hit = 1; next }
            }
            hit { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "WARNING: no [$version] CHANGELOG section; using tag annotation as body" >&2
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME" > /tmp/release-notes.md
          fi
          echo "----- /tmp/release-notes.md preview -----"
          head -30 /tmp/release-notes.md
      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist.zip
            dist.zip.sha256
